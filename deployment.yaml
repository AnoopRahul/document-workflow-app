apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-workflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: document-workflow
  template:
    metadata:
      labels:
        app: document-workflow
    spec:
      containers:
      - name: app
        image: anooprahul2006/document-workflow:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: document-service
spec:
  type: NodePort
  selector:
    app: document-workflow
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007